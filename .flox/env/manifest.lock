{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "bat": {
        "pkg-path": "bat"
      },
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "codex": {
        "pkg-path": "flox/codex",
        "pkg-group": "codex"
      },
      "crush": {
        "pkg-path": "flox/crush",
        "pkg-group": "crush"
      },
      "curl": {
        "pkg-path": "curl"
      },
      "deepseek-tui": {
        "pkg-path": "flox/deepseek-tui",
        "pkg-group": "deepseek-tui"
      },
      "gemini-cli": {
        "pkg-path": "flox/gemini-cli",
        "pkg-group": "gemini-cli"
      },
      "huggingface-hub": {
        "pkg-path": "flox/huggingface-hub",
        "pkg-group": "huggingface-hub"
      },
      "llamacpp": {
        "pkg-path": "flox-labs/llamacpp",
        "pkg-group": "llamacpp"
      },
      "llamacpp-launchers": {
        "pkg-path": "flox-labs/llamacpp-launchers",
        "pkg-group": "llamacpp-launchers"
      },
      "llamacpp-proxy": {
        "pkg-path": "flox-labs/llamacpp-proxy",
        "pkg-group": "llamacpp-proxy"
      },
      "opencode": {
        "pkg-path": "flox/opencode",
        "pkg-group": "opencode"
      },
      "vram-optimizer": {
        "pkg-path": "flox-labs/vram-optimizer",
        "pkg-group": "vram-optimizer"
      }
    },
    "hook": {
      "on-activate": "  cat <<'BANNER'\n\n  llamacpp - local model runtime for coding agents\n\n  Quick start:\n    llamacpp launch claude --model qwen3-coder           # auto-selects best GGUF, configures VRAM\n    llamacpp launch codex --model qwen3-coder\n    llamacpp launch crush --model qwen3-coder\n    llamacpp launch deepseek --model qwen3-coder\n    llamacpp launch gemini --model qwen3-coder\n    llamacpp launch aider --model qwen3-coder\n    llamacpp launch opencode --model qwen3-coder\n\n  Find models:\n    llamacpp model search qwen3                          # search HuggingFace for GGUF models\n    llamacpp model search devstral                       # try different model families\n    llamacpp model search llama                          # browse what's available\n\n  Model spec formats:\n    qwen3-coder                                          # search term (auto-resolves)\n    unsloth/Qwen3-Coder-Next-GGUF:Q4_K_M                # HuggingFace repo + quantization\n    /path/to/model.gguf                                  # local file\n\n  Context vs speed:\n    llamacpp launch claude --model qwen3-coder --big-context   # more context, slightly slower\n    llamacpp launch claude --model qwen3-coder --max-context   # maximum context window\n\n  Manual tuning:\n    llamacpp launch claude --model qwen3-coder --gpu-layers 25 --ctx-size 65536\n\n  Service management:\n    flox services status                                 # check running services\n    flox services logs llama-server                      # view server logs\n    flox services logs llamacpp-proxy                    # view proxy logs\n\n  More: llamacpp help                                    readme\n\nBANNER\n"
    },
    "profile": {
      "bash": "  source \"$FLOX_ENV/share/llamacpp-launchers/llamacpp.sh\"\n",
      "zsh": "  function llamacpp() { command llamacpp \"$@\"; }\n  function readme() { command llamacpp readme; }\n",
      "fish": "  function readme --description \"display llamacpp README\"\n    llamacpp readme\n  end\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "services": {
      "llama-server": {
        "command": "  [ -f \"$FLOX_ENV_CACHE/llama-server.env\" ] && . \"$FLOX_ENV_CACHE/llama-server.env\"\n  model_spec=$(cat \"$FLOX_ENV_CACHE/llama-server.model\" 2>/dev/null)\n  if [ -z \"$model_spec\" ]; then\n    # no model configured: download a small placeholder so the service starts\n    model_spec=\"unsloth/SmolLM2-135M-Instruct-GGUF:Q8_0\"\n    printf '%s' \"$model_spec\" > \"$FLOX_ENV_CACHE/llama-server.model\"\n    echo \"[llamacpp] No model configured. Using placeholder: $model_spec (145 MB)\" >&2\n    echo \"[llamacpp] Run 'llamacpp launch <harness> --model <spec>' to use a better model.\" >&2\n  fi\n  case \"$model_spec\" in\n    *.gguf) model_flag=\"--model\" ;;\n    *)      model_flag=\"--hf-repo\" ;;\n  esac\n  exec llama-server \\\n    $model_flag \"$model_spec\" \\\n    --host \"${LLAMACPP_HOST:-127.0.0.1}\" \\\n    --port \"${LLAMACPP_PORT:-8080}\" \\\n    --ctx-size \"${LLAMACPP_CTX_SIZE:-65536}\" \\\n    --n-gpu-layers \"${LLAMACPP_GPU_LAYERS:-99}\" \\\n    --api-key \"${LLAMACPP_API_KEY:-llamacpp-local}\" \\\n    --jinja \\\n    --flash-attn on\n"
      },
      "llamacpp-proxy": {
        "command": "  [ -f \"$FLOX_ENV_CACHE/llama-server.env\" ] && . \"$FLOX_ENV_CACHE/llama-server.env\"\n  exec llamacpp-proxy \\\n    --listen \"${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_PROXY_PORT:-8081}\" \\\n    --backend \"${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_PORT:-8080}\" \\\n    --backend-api-key \"${LLAMACPP_API_KEY:-llamacpp-local}\"\n"
      }
    }
  },

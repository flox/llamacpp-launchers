schema-version = "1.12.0"

[install]
llamacpp.pkg-path = "flox-labs/llamacpp"
llamacpp.pkg-group = "llamacpp"
llamacpp.systems = ["aarch64-darwin", "aarch64-linux", "x86_64-linux"]
huggingface-hub.pkg-path = "flox/huggingface-hub"
huggingface-hub.pkg-group = "huggingface-hub"
claude-code.pkg-path = "flox/claude-code"
claude-code.pkg-group = "claude-code"
curl.pkg-path = "curl"
codex.pkg-path = "flox/codex"
codex.pkg-group = "codex"
gemini-cli.pkg-path = "flox/gemini-cli"
gemini-cli.pkg-group = "gemini-cli"
crush.pkg-path = "flox/crush"
crush.pkg-group = "crush"
opencode.pkg-path = "flox/opencode"
opencode.pkg-group = "opencode"
deepseek-tui.pkg-path = "flox/deepseek-tui"
deepseek-tui.pkg-group = "deepseek-tui"


[vars]


[hook]
on-activate = '''
  cat <<'BANNER'

  llamacpp - local model runtime for coding agents

  Quick start:
    llamacpp launch claude --model qwen3-coder           # auto-selects best GGUF, configures VRAM
    llamacpp launch codex --model qwen3-coder
    llamacpp launch crush --model qwen3-coder
    llamacpp launch deepseek --model qwen3-coder
    llamacpp launch gemini --model qwen3-coder
    llamacpp launch aider --model qwen3-coder
    llamacpp launch opencode --model qwen3-coder

  Find models:
    llamacpp model search qwen3                          # search HuggingFace for GGUF models
    llamacpp model search devstral                       # try different model families
    llamacpp model search llama                          # browse what's available

  Model spec formats:
    qwen3-coder                                          # search term (auto-resolves)
    unsloth/Qwen3-Coder-Next-GGUF:Q4_K_M                # HuggingFace repo + quantization
    /path/to/model.gguf                                  # local file

  Context vs speed:
    llamacpp launch claude --model qwen3-coder --big-context   # more context, slightly slower
    llamacpp launch claude --model qwen3-coder --max-context   # maximum context window

  Manual tuning:
    llamacpp launch claude --model qwen3-coder --gpu-layers 25 --ctx-size 65536

  Service management:
    flox services status                                 # check running services
    flox services logs llama-server                      # view server logs
    flox services logs llamacpp-proxy                    # view proxy logs

  More: llamacpp help

BANNER
'''

[profile]
common = '''
  export PATH="/home/daedalus/dev/vram-optimizer/target/release:/home/daedalus/dev/llamacpp-proxy/target/release:$PATH"
  source "$FLOX_ENV_PROJECT/bin/llamacpp"
'''


[services]
[services.llamacpp-proxy]
command = '''
  [ -f "$FLOX_ENV_CACHE/llama-server.env" ] && . "$FLOX_ENV_CACHE/llama-server.env"
  exec /home/daedalus/dev/llamacpp-proxy/target/release/llamacpp-proxy \
    --listen "${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_PROXY_PORT:-8081}" \
    --backend "${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_PORT:-8080}" \
    --backend-api-key "${LLAMACPP_API_KEY:-llamacpp-local}"
'''

[services.llama-server]
command = '''
  [ -f "$FLOX_ENV_CACHE/llama-server.env" ] && . "$FLOX_ENV_CACHE/llama-server.env"
  model_spec=$(cat "$FLOX_ENV_CACHE/llama-server.model" 2>/dev/null)
  if [ -z "$model_spec" ]; then
    echo "[llamacpp] No model configured. Run: llamacpp model set <spec>" >&2
    exit 1
  fi
  case "$model_spec" in
    *.gguf) model_flag="--model" ;;
    *)      model_flag="--hf-repo" ;;
  esac
  exec llama-server \
    $model_flag "$model_spec" \
    --host "${LLAMACPP_HOST:-127.0.0.1}" \
    --port "${LLAMACPP_PORT:-8080}" \
    --ctx-size "${LLAMACPP_CTX_SIZE:-65536}" \
    --n-gpu-layers "${LLAMACPP_GPU_LAYERS:-99}" \
    --api-key "${LLAMACPP_API_KEY:-llamacpp-local}" \
    --jinja \
    --flash-attn on
'''


[include]


[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
#   "x86_64-darwin",
  "x86_64-linux",
]
# Uncomment to disable CUDA detection.
# cuda-detection = false

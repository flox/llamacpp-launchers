schema-version = "1.12.0"

[install]
# runtime dependencies
vram-optimizer.pkg-path = "flox-labs/vram-optimizer"
vram-optimizer.pkg-group = "vram-optimizer"
llamacpp-proxy.pkg-path = "flox-labs/llamacpp-proxy"
llamacpp-proxy.pkg-group = "llamacpp-proxy"
llamacpp-launchers.pkg-path = "flox-labs/llamacpp-launchers"
llamacpp-launchers.pkg-group = "llamacpp-launchers"

# coding agent harnesses
claude-code.pkg-path = "flox/claude-code"
claude-code.pkg-group = "claude-code"
codex.pkg-path = "flox/codex"
codex.pkg-group = "codex"
gemini-cli.pkg-path = "flox/gemini-cli"
gemini-cli.pkg-group = "gemini-cli"
crush.pkg-path = "flox/crush"
crush.pkg-group = "crush"
opencode.pkg-path = "flox/opencode"
opencode.pkg-group = "opencode"
deepseek-tui.pkg-path = "flox/deepseek-tui"
deepseek-tui.pkg-group = "deepseek-tui"

# flox mcp server
flox-mcp-server.pkg-path = "flox/flox-mcp-server"
flox-mcp-server.pkg-group = "flox-mcp-server"
flox-mcp-server.systems = ["aarch64-darwin", "x86_64-linux"]

# adjacent utilities
huggingface-hub.pkg-path = "flox/huggingface-hub"
huggingface-hub.pkg-group = "huggingface-hub"
curl.pkg-path = "curl"
bat.pkg-path = "bat"

# ask-flox: cited retrieval over the Flox docs + blog as an MCP tool.
# flox-labs is a separate catalog page -> own pkg-group (cf. flox-cuda lesson).
ask-flox.pkg-path = "flox-labs/ask-flox"
ask-flox.pkg-group = "ask-flox"
# Torch-free retrieval runtime. Pin python313 (deps are python313Packages, and
# `python3` floats to 3.14); mcp + chromadb (brings onnxruntime) in own groups.
python313.pkg-path = "python313"
mcp.pkg-path = "python313Packages.mcp"
mcp.pkg-group = "mcp"
chromadb.pkg-path = "python313Packages.chromadb"
chromadb.pkg-group = "chromadb"

[vars]


[hook]
on-activate = '''
  cat <<'BANNER'

  llamacpp - local model runtime for coding agents

  Quick start:
    llamacpp launch claude --model qwen3-coder           # auto-selects best GGUF, configures VRAM
    llamacpp launch codex --model qwen3-coder
    llamacpp launch crush --model qwen3-coder
    llamacpp launch deepseek --model qwen3-coder
    llamacpp launch gemini --model qwen3-coder
    llamacpp launch aider --model qwen3-coder
    llamacpp launch opencode --model qwen3-coder

  Find models:
    llamacpp model search qwen3                          # search HuggingFace for GGUF models
    llamacpp model search devstral                       # try different model families
    llamacpp model search llama                          # browse what's available

  Model spec formats:
    qwen3-coder                                          # search term (auto-resolves)
    unsloth/Qwen3-Coder-Next-GGUF:Q4_K_M                # HuggingFace repo + quantization
    /path/to/model.gguf                                  # local file

  Context vs speed:
    llamacpp launch claude --model qwen3-coder --big-context   # more context, slightly slower
    llamacpp launch claude --model qwen3-coder --max-context   # maximum context window

  Manual tuning:
    llamacpp launch claude --model qwen3-coder --gpu-layers 25 --ctx-size 65536

  Service management:
    flox services status                                 # check running services
    flox services logs llama-server                      # view server logs
    flox services logs llamacpp-proxy                    # view proxy logs

  More: llamacpp help                                    readme

  ask-flox                                               Claude Code (hosted) + cited Flox-docs retrieval
  ask-flox qwen3-coder                                   same, but on a LOCAL model via llamacpp

BANNER

  # ask-flox: put the retrieval launcher on PATH and expose an MCP config.
  # The launcher stages the read-only index to a writable cache, seeds the ONNX
  # model, and runs the stdio server with this env's python313 (offline, no torch).
  mkdir -p "$FLOX_ENV_CACHE/bin"
  install -m755 "$FLOX_ENV/share/ask-flox/ask-flox-mcp" "$FLOX_ENV_CACHE/bin/ask-flox-mcp"
  export PATH="$FLOX_ENV_CACHE/bin:$PATH"
  cat > "$FLOX_ENV_CACHE/ask-flox.mcp.json" <<EOF
{ "mcpServers": { "ask-flox": { "command": "ask-flox-mcp" } } }
EOF
'''

[profile]
bash = '''
  source "$FLOX_ENV/share/llamacpp-launchers/llamacpp.sh"
  # ask-flox: Claude Code + the search_flox_docs tool.
  #   ask-flox                -> hosted Claude
  #   ask-flox <model>        -> LOCAL model via llamacpp (tool passed after --)
  ask-flox() {
    if [ -n "${1:-}" ]; then
      llamacpp launch claude --model "$1" -- \
        --mcp-config "$FLOX_ENV_CACHE/ask-flox.mcp.json" "${@:2}"
    else
      claude --mcp-config "$FLOX_ENV_CACHE/ask-flox.mcp.json"
    fi
  }
'''
zsh = '''
  function llamacpp() { command llamacpp "$@"; }
  function readme() { command llamacpp readme; }
  # ask-flox: hosted Claude (no arg) or LOCAL model (ask-flox <model>) + the tool.
  ask-flox() {
    if [ -n "${1:-}" ]; then
      llamacpp launch claude --model "$1" -- \
        --mcp-config "$FLOX_ENV_CACHE/ask-flox.mcp.json" "${@:2}"
    else
      claude --mcp-config "$FLOX_ENV_CACHE/ask-flox.mcp.json"
    fi
  }
'''
fish = '''
  function readme --description "display llamacpp README"
    llamacpp readme
  end
  # ask-flox: hosted Claude (no arg) or LOCAL model (ask-flox <model>) + the tool.
  function ask-flox
    if test -n "$argv[1]"
      llamacpp launch claude --model "$argv[1]" -- \
        --mcp-config "$FLOX_ENV_CACHE/ask-flox.mcp.json" $argv[2..-1]
    else
      claude --mcp-config "$FLOX_ENV_CACHE/ask-flox.mcp.json"
    end
  end
'''


[services]
# proxy only — llama-server comes from the included llamacpp-server env
[services.llamacpp-proxy]
command = '''
  [ -f "$FLOX_ENV_CACHE/llama-server.env" ] && . "$FLOX_ENV_CACHE/llama-server.env"
  exec llamacpp-proxy \
    --listen "${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_PROXY_PORT:-8081}" \
    --backend "${LLAMACPP_HOST:-127.0.0.1}:${LLAMACPP_PORT:-8080}" \
    --backend-api-key "${LLAMACPP_API_KEY:-llamacpp-local}"
'''


[include]
environments = [
    { remote = "flox-labs/llamacpp-server" }
]


[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
# "x86_64-darwin",
  "x86_64-linux",
]
# uncomment to disable cuda detection
# cuda-detection = false
